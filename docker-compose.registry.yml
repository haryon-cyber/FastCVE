services:
  fastcve-db:
    image: "fastcve-db:latest"
    container_name: fastcve-db
    environment:
      - POSTGRES_USER=${FCDB_USER}
      - POSTGRES_PASSWORD=${FCDB_PASS}
      - POSTGRES_DB=vuln_db
    ports:
      - "127.0.0.1:6630:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      backend:
        aliases:
          - fastcve-db

  fastcve:
    image: "fastcve:latest"
    container_name: fastcve
    depends_on:
      fastcve-db:
        condition: service_healthy
    environment:
      - INP_ENV_NAME=${INP_ENV_NAME:-dev}
      - FCDB_USER=${FCDB_USER}
      - FCDB_PASS=${FCDB_PASS}
      - FCDB_WEB_PARAMS=--host 0.0.0.0 --port 8000 --workers 4
      - NVD_API_KEY=${NVD_API_KEY}
    command: ["/bin/sh", "-c", "python -m web.prestart && exec uvicorn web.app:app $$FCDB_WEB_PARAMS"]
    ports:
      - "127.0.0.1:10210:8000"
    networks:
      - backend

networks:
  backend: